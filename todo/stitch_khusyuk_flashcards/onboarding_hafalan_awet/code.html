<style>
      body {
        background-color: #fbf9f5;
        color: #1b1c1a;
        overflow-x: hidden;
      }
      .memory-curve {
        stroke-dasharray: 1000;
        stroke-dashoffset: 1000;
        animation: draw 3s ease-out forwards;
      }
      @keyframes draw {
        to {
          stroke-dashoffset: 0;
        }
      }
      .glow-subtle {
        filter: drop-shadow(0 0 8px rgba(115, 92, 0, 0.2));
      }
      .spiritual-pattern {
        background-color: #fbf9f5;
        background-image: radial-gradient(#efeeea 1px, transparent 1px);
        background-size: 24px 24px;
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="spiritual-pattern flex flex-col min-h-screen">
<!-- Top Navigation Placeholder (Hidden for Transactional Onboarding per mandate) -->
<main class="flex-grow flex flex-col items-center justify-center px-container-padding pt-12 pb-32">
<!-- Progress Indicator -->
<div class="flex gap-2 mb-12">
<div class="w-2 h-2 rounded-full bg-surface-container-highest"></div>
<div class="w-2 h-2 rounded-full bg-surface-container-highest"></div>
<div class="w-8 h-2 rounded-full bg-secondary transition-all duration-500"></div>
<div class="w-2 h-2 rounded-full bg-surface-container-highest"></div>
</div>
<!-- Main Content Area: Visualization Card -->
<div class="relative w-full max-w-md aspect-[4/5] bg-surface-container-lowest rounded-2xl shadow-sm border-t-2 border-secondary/20 flex flex-col items-center justify-center overflow-hidden p-8 mb-section-gap">
<!-- Animated Shader Background for Atmosphere -->

<div class="relative z-10 w-full h-full flex flex-col items-center justify-between">
<!-- Memory Curve Visualization -->
<div class="w-full flex-grow flex items-center justify-center">
<svg class="w-full h-auto drop-shadow-lg" viewbox="0 0 400 300">
<!-- Grid Lines -->
<line stroke="#efeeea" stroke-width="2" x1="40" x2="360" y1="260" y2="260"></line>
<line stroke="#efeeea" stroke-width="2" x1="40" x2="40" y1="260" y2="40"></line>
<!-- Spaced Repetition Peaks -->
<path class="memory-curve" d="M 40,60 L 100,260 L 110,60 L 180,260 L 195,60 L 290,260 L 310,60 L 360,120" fill="none" stroke="#735c00" stroke-linecap="round" stroke-linejoin="round" stroke-width="3"></path>
<!-- Glow Orbs at Peaks -->
<circle class="animate-pulse" cx="40" cy="60" fill="#fed65b" r="6"></circle>
<circle class="animate-pulse" cx="110" cy="60" fill="#fed65b" r="6" style="animation-delay: 0.5s"></circle>
<circle class="animate-pulse" cx="195" cy="60" fill="#fed65b" r="6" style="animation-delay: 1s"></circle>
<circle class="animate-pulse" cx="310" cy="60" fill="#fed65b" r="6" style="animation-delay: 1.5s"></circle>
<!-- Spaced Intervals Labels (Stylized) -->
<text class="font-label-md text-[10px]" fill="#404944" x="70" y="285">Hari 1</text>
<text class="font-label-md text-[10px]" fill="#404944" x="150" y="285">Hari 3</text>
<text class="font-label-md text-[10px]" fill="#404944" x="240" y="285">Hari 7</text>
<text class="font-label-md text-[10px]" fill="#404944" x="330" y="285">Hari 14</text>
</svg>
</div>
<!-- Card Bottom Icon -->
<div class="mt-8 bg-primary-container text-on-primary-container w-16 h-16 rounded-full flex items-center justify-center shadow-lg">
<span class="material-symbols-outlined text-4xl" data-icon="auto_awesome">auto_awesome</span>
</div>
</div>
<!-- Background Aesthetic Image -->
<div class="absolute inset-0 -z-10 opacity-5">
<img class="w-full h-full object-cover" data-alt="A serene and minimalist Islamic architectural pattern with soft shadows cast across a textured parchment wall. The lighting is ethereal and warm, suggesting a quiet morning in a spiritual sanctuary. The color palette is composed of soft creams, sage greens, and muted golds, creating a feeling of deep tranquility and timelessness. The overall composition is clean and focused, embodying a modern spiritual aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCPNFfM0y3tHL83FWU0USC1ZIWiaU976NYnKw8j_tk2Ag9qbewiLo2O5r_h2dRy2tPe4e_xB95fYGOyyIVmESALUnEl2YtaGSJ_N2zP1b4Zvuv7UnSiZWvo3XaiBh7AFK8t6gP8K1Gl-Vybr-jXOdiCbTPaqfdmSv8TTJr6eEEmnIGWdqK7gkhJhgLHUBF7QQz5l-8Z6wSPHFGQwrT4gVLNH5JvLYDn-Gju3-IgF6w2LoPOsELvwG3tyvZnM3TVNtx8m0_k_W61-YJt"/>
</div>
</div>
<!-- Typography Section -->
<div class="text-center max-w-sm space-y-4">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary tracking-tight font-bold">
                Ingatan yang Kuat
            </h1>
<p class="font-body-md text-body-md text-on-surface-variant leading-relaxed px-4">
                Sistem Spaced Repetition memastikan apa yang Anda pelajari hari ini akan tetap diingat selamanya.
            </p>
</div>
</main>
<!-- Fixed Action Button (Bottom) -->
<div class="fixed bottom-0 left-0 w-full p-container-padding bg-gradient-to-t from-background via-background/90 to-transparent pt-12">
<div class="max-w-md mx-auto flex items-center justify-between gap-4">
<!-- Skip Button -->
<button class="flex-1 h-touch-target font-label-md text-label-md text-on-surface-variant active:scale-95 transition-transform duration-200">
                Lewati
            </button>
<!-- Primary Action -->
<button class="flex-[2] bg-primary text-on-primary h-touch-target rounded-full font-label-md text-label-md shadow-lg shadow-primary/20 flex items-center justify-center gap-2 active:scale-95 transition-transform duration-200">
                Lanjut
                <span class="material-symbols-outlined text-lg">arrow_forward</span>
</button>
</div>
</div>
<!-- Micro-interaction Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const button = document.querySelector('button.bg-primary');
            button.addEventListener('click', () => {
                // Subtle haptic feedback feel
                button.style.transform = 'scale(0.98)';
                setTimeout(() => {
                    button.style.transform = 'scale(1)';
                }, 100);
            });
        });
    </script>
</body></html>
