<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            vertical-align: middle;
        }
        .flashcard-inner {
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }
        .flashcard-flipped .flashcard-inner {
            transform: rotateY(180deg);
        }
        .flashcard-front, .flashcard-back {
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }
        .flashcard-back {
            transform: rotateY(180deg);
        }
        .glass-effect {
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

<body class="bg-background text-on-background min-h-screen font-body-md flex flex-col">

<div class="flex items-center gap-3">

<img alt="User profile" class="w-full h-full object-cover" data-alt="A professional and serene portrait of a middle-aged man with a neat beard, looking calmly at the camera. The background is a soft-focus interior with warm, natural lighting. The overall color palette features muted earth tones and soft highlights, creating an atmosphere of tranquility and spiritual focus in line with a premium devotional app." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCplPq7MM-ebdeM4D14dHxwgH3g4ns8pGi-iQHnFixS62nxggn1jlFbQ_4Z7eevrUYpJKRfQ3hJ-PO1kmhL7yfscwEVI1cGdawY-eM2rW1kG72tgK0a2pvxgeABDms46DBYfq2JXsX7mZuEeBDKPGKgBv56MJolUw7xXl4mDHetw1rncA-4kk0DV0DXdOGzyGRFYkes6UUj_pJVRUP_U-gvyKhMzp1C6HLlYT1A0NQ7vbxs95KgCJcgvnYI7bNGeVTJxchdC1mCBufY"/>

<h1 class="font-headline-md text-headline-md-mobile text-primary">Sholat Khusyuk</h1>
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-high transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined text-primary" data-icon="settings">settings</span>
</button>
</header>
<main class="flex-1 mt-16 mb-24 px-container-padding flex flex-col items-center">
<!-- Mode Toggle -->
<div class="mt-base bg-surface-container-low p-1 rounded-full flex gap-1 w-full max-w-xs shadow-inner">
<button class="flex-1 py-2 px-4 rounded-full text-label-md font-label-md bg-secondary-container text-on-secondary-container shadow-sm transition-all duration-300">
                Per Kata
            </button>
<button class="flex-1 py-2 px-4 rounded-full text-label-md font-label-md text-on-surface-variant hover:text-primary transition-all duration-300">
                Per Ayat
            </button>
</div>
<!-- Progress Section -->
<div class="w-full mt-stack-gap space-y-2">
<div class="flex justify-between items-end">
<span class="text-label-md font-label-md text-on-surface-variant">Daily Goal</span>
<span class="text-label-md font-label-md text-primary font-bold">12/20 Words</span>
</div>
<div class="h-1.5 w-full bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full bg-secondary-fixed-dim transition-all duration-1000 ease-out" style="width: 60%"></div>
</div>
</div>
<!-- Flashcard Area -->
<div class="flex-1 w-full flex items-center justify-center py-base">
<div class="relative w-full aspect-[4/5] max-h-[450px] cursor-pointer group perspective-1000" id="flashcard" onclick="this.classList.toggle('flashcard-flipped')">
<div class="flashcard-inner relative w-full h-full shadow-[0_20px_50px_rgba(6,78,59,0.08)] rounded-2xl">
<!-- Front of Card -->
<div class="flashcard-front absolute inset-0 bg-surface rounded-2xl border-t-2 border-secondary-fixed flex flex-col items-center justify-center p-8">
<div class="flex-1 flex flex-col items-center justify-center">
<span class="text-[64px] leading-tight text-primary font-serif mb-4" dir="rtl">ٱلْحَمْدُ</span>
<span class="font-label-md text-label-md text-outline tracking-widest uppercase">Al-hamdu</span>
</div>
<div class="flex flex-col items-center gap-2 opacity-60 group-hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-secondary" data-icon="touch_app">touch_app</span>
<p class="font-label-md text-label-md text-on-surface-variant">Tap to see meaning</p>
</div>
</div>
<!-- Back of Card -->
<div class="flashcard-back absolute inset-0 bg-surface-container-low rounded-2xl border-t-2 border-secondary-fixed flex flex-col items-center justify-center p-8">

<p class="font-body-md text-body-md text-on-surface-variant text-center max-w-[200px]">
                                Pujian yang sempurna hanya milik Allah SWT.
                            </p>
<div class="mt-8 pt-8 border-t border-outline-variant/30 w-full flex justify-around">
<div class="text-center">
<span class="block text-primary font-bold text-label-md">1.2k</span>
<span class="text-[10px] uppercase tracking-tighter text-outline">Learned</span>
</div>
<div class="text-center">
<span class="block text-primary font-bold text-label-md">Al-Fatihah</span>
<span class="text-[10px] uppercase tracking-tighter text-outline">Source</span>
</div>
</div>
</div>
</div>
</div>
</div>
</div>
<!-- Action Buttons (Spaced Repetition) -->
<div class="w-full grid grid-cols-4 gap-3 mt-4">
<button class="flex flex-col items-center gap-1 group active:scale-90 transition-transform">
<div class="w-full h-12 rounded-xl bg-error/10 border border-error/20 flex items-center justify-center text-error group-hover:bg-error group-hover:text-white transition-all">
<span class="material-symbols-outlined" data-icon="replay">replay</span>
</div>
<span class="text-[10px] font-bold uppercase text-error">Again</span>
</button>
<button class="flex flex-col items-center gap-1 group active:scale-90 transition-transform">
<div class="w-full h-12 rounded-xl bg-on-secondary-fixed-variant/10 border border-on-secondary-fixed-variant/20 flex items-center justify-center text-on-secondary-fixed-variant group-hover:bg-on-secondary-fixed-variant group-hover:text-white transition-all">
<span class="material-symbols-outlined" data-icon="bolt">bolt</span>
</div>
<span class="text-[10px] font-bold uppercase text-on-secondary-fixed-variant">Hard</span>
</button>
<button class="flex flex-col items-center gap-1 group active:scale-90 transition-transform">
<div class="w-full h-12 rounded-xl bg-primary-container/10 border border-primary-container/20 flex items-center justify-center text-primary-container group-hover:bg-primary-container group-hover:text-white transition-all">

</div>
<span class="text-[10px] font-bold uppercase text-primary-container">Good</span>
</button>
<button class="flex flex-col items-center gap-1 group active:scale-90 transition-transform">

<span class="material-symbols-outlined" data-icon="auto_awesome">auto_awesome</span>
</div>
<span class="text-[10px] font-bold uppercase text-tertiary">Easy</span>
</button>
</div>

<span class="font-label-md text-label-md">Stats</span>
</a>

</a>

<!-- Subtle Ambient Background Effect -->
<div class="fixed inset-0 -z-10 pointer-events-none overflow-hidden">
<div class="absolute top-[-10%] right-[-10%] w-[50%] h-[50%] rounded-full bg-primary/5 blur-[120px]"></div>
<div class="absolute bottom-[-5%] left-[-5%] w-[40%] h-[40%] rounded-full bg-secondary-fixed-dim/10 blur-[100px]"></div>
</div>
<script>
        // Simple micro-interaction for action buttons
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', function(e) {
                if(this.parentElement.classList.contains('grid-cols-4')) {
                    // Logic for SRS selection could go here
                    console.log('Selected difficulty: ' + this.innerText.trim());
                    
                    // Visual feedback for choice
                    const card = document.getElementById('flashcard');
                    card.style.transform = 'translateY(-20px) scale(1.02)';
                    card.style.opacity = '0';
                    
                    setTimeout(() => {
                        card.classList.remove('flashcard-flipped');
                        card.style.transform = 'translateY(20px) scale(0.95)';
                        setTimeout(() => {
                            card.style.transform = 'translateY(0) scale(1)';
                            card.style.opacity = '1';
                        }, 50);
                    }, 300);
                }
            });
        });
    </script>
