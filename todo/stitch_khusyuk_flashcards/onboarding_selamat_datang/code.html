<!DOCTYPE html>

<html class="light" lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">

        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-container-highest": "#e4e2de",
                    "on-error": "#ffffff",
                    "surface-bright": "#fbf9f5",
                    "tertiary": "#202f40",
                    "on-surface": "#1b1c1a",
                    "on-primary-container": "#80bea6",
                    "error": "#ba1a1a",
                    "tertiary-container": "#374557",
                    "on-secondary": "#ffffff",
                    "on-error-container": "#93000a",
                    "on-tertiary": "#ffffff",
                    "surface-container-low": "#f5f3ef",
                    "on-secondary-container": "#745c00",
                    "primary-fixed": "#b0f0d6",
                    "on-background": "#1b1c1a",
                    "surface-dim": "#dbdad6",
                    "on-secondary-fixed-variant": "#574500",
                    "surface-tint": "#2b6954",
                    "outline": "#707974",
                    "background": "#fbf9f5",
                    "surface-container": "#efeeea",
                    "on-surface-variant": "#404944",
                    "on-primary-fixed-variant": "#0b513d",
                    "primary": "#003527",
                    "surface": "#fbf9f5",
                    "secondary-fixed-dim": "#e9c349",
                    "secondary-fixed": "#ffe088",
                    "error-container": "#ffdad6",
                    "tertiary-fixed": "#d4e4fa",
                    "primary-container": "#064e3b",
                    "on-secondary-fixed": "#241a00",
                    "on-tertiary-fixed": "#0d1c2d",
                    "surface-container-lowest": "#ffffff",
                    "on-tertiary-fixed-variant": "#39485a",
                    "inverse-on-surface": "#f2f0ed",
                    "surface-container-high": "#eae8e4",
                    "on-primary": "#ffffff",
                    "surface-variant": "#e4e2de",
                    "primary-fixed-dim": "#95d3ba",
                    "outline-variant": "#bfc9c3",
                    "on-tertiary-container": "#a3b2c8",
                    "secondary": "#735c00",
                    "tertiary-fixed-dim": "#b9c8de",
                    "secondary-container": "#fed65b",
                    "inverse-surface": "#30312e",
                    "inverse-primary": "#95d3ba",

            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "touch-target": "48px",
                    "section-gap": "40px",
                    "base": "8px",
                    "stack-gap": "16px",
                    "container-padding": "24px"
            },
            "fontFamily": {
                    "headline-md": ["Libre Caslon Text"],
                    "headline-lg": ["Libre Caslon Text"],
                    "body-md": ["Manrope"],
                    "label-md": ["Manrope"],
                    "display-sm": ["Libre Caslon Text"],
                    "body-lg": ["Manrope"],
                    "headline-lg-mobile": ["Libre Caslon Text"]
            },
            "fontSize": {
                    "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "400"}],

                    "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "400"}]

          },
        },
      }
    </script>
<style>
        body {
            background-color: #fbf9f5;
            color: #1b1c1a;
            -webkit-font-smoothing: antialiased;
        }
        .ethereal-shadow {
            box-shadow: 0 10px 40px -10px rgba(6, 78, 59, 0.08);
        }
        .fade-in {
            animation: fadeIn 1.2s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .float-slow {
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-body-md selection:bg-primary-fixed selection:text-on-primary-fixed">
<!-- Main Canvas -->
<main class="relative min-h-screen flex flex-col items-center justify-between overflow-hidden">
<!-- Subtle Background Texture -->
<div class="absolute inset-0 pointer-events-none opacity-20" style="background-image: url('https://www.transparenttextures.com/patterns/handmade-paper.png');"></div>
<!-- Top Branding Anchor (Suppressed Shell as per Transactional Rule) -->
<div class="w-full px-container-padding pt-12 flex justify-center z-10">
<h1 class="font-headline-md text-headline-md text-primary tracking-tight font-bold">Sholat Khusyuk</h1>
</div>
<!-- Visual Hero Section (Asymmetric / Organic) -->
<div class="relative w-full flex-grow flex flex-items-center justify-center px-container-padding py-base overflow-hidden">
<div class="relative w-full max-w-sm aspect-[4/5] rounded-3xl overflow-hidden ethereal-shadow fade-in">
<img alt="Peaceful Mosque Silhouette" class="w-full h-full object-cover grayscale-[0.2] sepia-[0.1]" data-alt="A serene landscape featuring a minimalist mosque silhouette in the far distance under a soft, golden twilight sky. The scene is bathed in a tranquil atmosphere with a soft-focus hazy horizon, incorporating shades of deep emerald green and warm parchment cream. The lighting is diffused and ethereal, creating a meditative digital art piece that embodies spiritual peace and tranquility." src="https://lh3.googleusercontent.com/aida-public/AB6AXuB0SlCSUmrWshbzzJW5wj07FHWIkgI7mv-eGVEipYG_SMsCdVp2GbThym-l3MTsiOF-bZAojb3siaITyAPysHWRCKEWyR_heJAs3HGF02_lW80b2Oi8_QwjyW4O6d1kpm5GGmK692MSsp2S5fm0jbylaDYPeZpsb-Rd1EsTpwMSD04IN3sXzXgPsvXgSDcC2WWpNMyrOWv31jn3YrM_StITv3hU3luDZ2x0z92u_x3vnU7H9LVTNORtkycch6NHvaZEbjV55c-mg6ho"/>
<!-- Decorative Layer -->
<div class="absolute inset-0 bg-gradient-to-t from-primary/40 to-transparent"></div>
<div class="absolute bottom-8 left-0 w-full flex justify-center">
<div class="w-16 h-0.5 bg-secondary rounded-full opacity-60"></div>
</div>
</div>
<!-- Floating Decorative Element -->
<div class="absolute top-1/4 -right-8 w-32 h-32 bg-secondary-container/20 rounded-full blur-3xl float-slow"></div>
<div class="absolute bottom-1/4 -left-12 w-48 h-48 bg-primary-container/10 rounded-full blur-3xl float-slow" style="animation-delay: -2s;"></div>
</div>
<!-- Content Section -->
<div class="w-full bg-surface-container-lowest rounded-t-[40px] px-container-padding pt-10 pb-12 z-20 ethereal-shadow">
<div class="max-w-md mx-auto flex flex-col gap-stack-gap">
<!-- Headline & Subheadline -->
<div class="text-center space-y-4 fade-in" style="animation-delay: 0.3s;">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-primary font-bold tracking-tight">
                        Ibadah Lebih Bermakna
                    </h2>
<p class="font-body-lg text-body-lg text-on-surface-variant leading-relaxed px-2">
                        Pahami setiap kata yang Anda ucapkan untuk meraih kekhusyukan yang mendalam.
                    </p>
</div>
<!-- Progress Indicator (Elegant Gold Line Style) -->
<div class="flex justify-center items-center gap-3 py-6 fade-in" style="animation-delay: 0.5s;">
<div class="h-1.5 w-8 rounded-full bg-secondary"></div>
<div class="h-1.5 w-1.5 rounded-full bg-surface-container-highest"></div>
<div class="h-1.5 w-1.5 rounded-full bg-surface-container-highest"></div>
<div class="h-1.5 w-1.5 rounded-full bg-surface-container-highest"></div>
</div>
<!-- Primary Action -->
<div class="pt-2 fade-in" style="animation-delay: 0.7s;">
<button class="w-full h-touch-target bg-primary text-on-primary font-label-md text-label-md rounded-full flex items-center justify-center gap-2 active:scale-[0.98] transition-transform shadow-lg shadow-primary/10">
<span>Lanjut</span>
<span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
<button class="w-full mt-4 h-touch-target text-on-surface-variant font-label-md text-label-md hover:text-primary transition-colors">
                        Lewati
                    </button>
</div>
</div>
</div>
</main>
<!-- Subtle Grain Overlay -->
<div class="fixed inset-0 pointer-events-none z-50 opacity-[0.03] mix-blend-multiply">
<svg viewbox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
<filter id="noiseFilter">
<feturbulence basefrequency="0.65" numoctaves="3" stitchtiles="stitch" type="fractalNoise"></feturbulence>
</filter>
<rect filter="url(#noiseFilter)" height="100%" width="100%"></rect>
</svg>
</div>
<script>
        // Simple Interaction logic for button
        document.querySelector('button').addEventListener('click', function() {
            // Placeholder for navigation
            this.style.opacity = '0.7';
            setTimeout(() => {
                this.style.opacity = '1';
            }, 150);
        });
    </script>
</body></html>
